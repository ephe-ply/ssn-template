<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@300..800&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Host Grotesk', sans-serif;
            background-color: transparent;
            font-size: 18px; 
        }

        #chat-container {
            padding: 10px;
            max-width: 450px;
            margin: auto;
            height: 100vh;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            box-sizing: border-box;
        }

        #chat-container::-webkit-scrollbar {
            display: none;
        }

        .message-container {
            position: relative;
            margin-bottom: 10px;       
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            width: 100%;
        }

        .message-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .message-container.removing {
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        .badges:empty, span:empty, .text:empty, .donation:empty {
            display: none;
        }

        /* Minimal Header Block (Inline Flow) */
        .message-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;                 
            margin-bottom: 2px;       
        }

        /* Black Timestamp */
        .timestamp {
            font-size: 0.85em;         
            color: #000000;           
            font-weight: 500;
            user-select: none;
        }

        /* Platform Icons Scaling */
        .platform-icon {
            height: 0.95em;            
            width: auto;
            display: inline-block;
        }

        /* Black Username layout with 17-character truncation */
        .username {
            color: #000000;           
            font-weight: 700;
            font-size: 0.95em;        
            letter-spacing: 0.2px;
            max-width: 17ch;          /* Locks visual width roughly to 17 characters */
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;  /* Appends "..." dynamically */
            display: inline-block;
            vertical-align: bottom;
        }

        .badge {
            height: 0.9em;           
            vertical-align: middle;
        }

        .badges {
            display: inline-flex;
            gap: 3px;
            align-items: center;
        }

        /* Blue Message content block */
        .text {
            color: #4A76A8;           
            font-size: 1em;         
            line-height: 1.35;        
            word-break: break-word;
            padding-left: 2px;
        }

        /* Bold, Bordered Donation Badge */
        .donation {
            display: inline-block;
            margin-top: 5px;          
            font-size: 0.8em;
            color: #1D5C5C;                  /* Darker teal for high contrast readability */
            font-weight: 800;                /* Ultra bold font weight */
            padding: 2px 8px;                /* Inner padding container */
            background: rgba(56, 178, 172, 0.15); /* Light translucent teal fill background */
            border: 1px solid #38B2AC;       /* Crisp accent border boundary */
            border-radius: 20px;             /* Rounded pill format styling */
            text-transform: uppercase;       /* Elevates attention draw */
            letter-spacing: 0.5px;
        }

        .badges svg, .badges img, .text svg, .text img {
            max-width: 48px;
            max-height: 20px;
        }
        
    </style>
</head>
<body>
    <div id="chat-container"></div>

    <script>
    var urlParams = new URLSearchParams(window.location.search);
    var roomID = urlParams.get("session") || "";
    var password = "false"; 
    var featuredMode = false; 

    var hideBots = urlParams.has("hidebots");
    if (urlParams.has("chroma")) {
        var _c = urlParams.get("chroma") || "";
        document.body.style.backgroundColor = _c.charAt(0) === "#" ? _c : "#" + _c;
    }
    if (urlParams.has("font")) {
        var _fs = parseInt(urlParams.get("font"), 10);
        if (!isNaN(_fs) && _fs > 0) { document.documentElement.style.fontSize = _fs + "px"; }
    }

    if (urlParams.has("fontfamily")) {
        var _ff = (urlParams.get("fontfamily") || "").trim();
        if (_ff) {
            var _safe = _ff.replace(/['"\\;{}<>]/g, "");
            var _gf = document.createElement("link");
            _gf.rel = "stylesheet";
            _gf.href = "https://fonts.googleapis.com/css2?family=" + encodeURIComponent(_safe).replace(/%20/g, "+") + ":wght@400;500;600;700&display=swap";
            document.head.appendChild(_gf);
            document.body.style.fontFamily = "'" + _safe + "', sans-serif";
        }
    }

    const chatContainer = document.getElementById('chat-container');

    const SHOWTIME = (() => {
        const v = parseInt(urlParams.get('showtime') || '30000');
        return isNaN(v) ? 30000 : v;
    })();

    function addMessageToOverlay(data) {
        if (hideBots && data.bot) { return; }
        if (!data.chatname && data.meta) { return; }

        const messageContainer = document.createElement('div');
        messageContainer.classList.add('message-container');

        let chatbadges = "";
        if (data.chatbadges) {
            data.chatbadges.slice(0, 2).forEach(badge => {
                if (typeof badge === "object") {
                    if (badge.type === "img" && badge.src) {
                        chatbadges += `<img class='badge' src='${badge.src}' />`;
                    } else if (badge.type === "svg" && badge.html) {
                        chatbadges += `<span class='badge svg'>${badge.html}</span>`;
                    }
                } else {
                    chatbadges += `<img class='badge' src='${badge}' />`;
                }
            });
        }

        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const timestampStr = `${hours}:${minutes}`;

        const platformIconHtml = data.type ? `<img class="platform-icon" src="https://socialstream.ninja/sources/images/${data.type}.png" onerror="this.style.display='none'" />` : '';

        // Added wrapper formatting container for inline execution
        messageContainer.innerHTML = `
            <div class="message-header">
                <span class="timestamp">[${timestampStr}]</span>
                ${platformIconHtml}
                <span class="username" title="${data.chatname}">${data.chatname}</span>
                <span class="badges">${chatbadges}</span>
            </div>
            <div class="text">${data.chatmessage || ''}</div>
            ${(data.donation||data.hasDonation) ? `<div><div class="donation">${(data.donation||data.hasDonation)}</div></div>` : ''}
        `;

        chatContainer.appendChild(messageContainer);

        messageContainer.offsetHeight;
        
        requestAnimationFrame(() => {
            messageContainer.classList.add('visible');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });

        if (SHOWTIME > 0) {
            setTimeout(() => {
                messageContainer.classList.add('removing');
                setTimeout(() => {
                    if (messageContainer.parentNode) {
                        messageContainer.parentNode.removeChild(messageContainer);
                    }
                }, 300);
            }, SHOWTIME);
        }
    }

    if (roomID) {
        document.addEventListener('DOMContentLoaded', () => {
            const iframe = document.createElement("iframe");
            iframe.src = featuredMode
                ? `https://vdo.socialstream.ninja/?ln&password=${password}&salt=vdo.ninja&label=overlay&exclude=${roomID}&scene&novideo&noaudio&cleanoutput&room=${roomID}`
                : `https://vdo.socialstream.ninja/?ln&salt=vdo.ninja&password=${password}&push&label=dock&vd=0&ad=0&novideo&noaudio&autostart&cleanoutput&room=${roomID}`;

            iframe.style.cssText = "width: 0px; height: 0px; position: fixed; left: -100px; top: -100px;";
            document.body.appendChild(iframe);

            window.addEventListener("message", (event) => {
                if (event.source !== iframe.contentWindow) return;
                if (event.data && typeof event.data === "object" && event.data.dataReceived && typeof event.data.dataReceived === "object" && event.data.dataReceived.overlayNinja) {
                    addMessageToOverlay(event.data.dataReceived.overlayNinja);
                }
            });
        });
        
        var conCon = 1;
        var socketserver = false;
        var serverURL = urlParams.has("localserver") ? "ws://127.0.0.1:3000" : "wss://io.socialstream.ninja";

        function setupSocket(){
            socketserver.onclose = function () {
                setTimeout(function(){
                    conCon+=1;
                    socketserver = new WebSocket(serverURL);
                    setupSocket();
                },100*conCon);
            };
            socketserver.onopen = function () {
                conCon = 1;
                socketserver.send(JSON.stringify({"join":roomID, "out":3, "in":4}));
            };
            socketserver.addEventListener('message', function (event) {
                if (event.data){
                    var data = JSON.parse(event.data);
                    addMessageToOverlay(data);
                    if (data.get){
                        var ret = {};
                        ret.callback = {};
                        ret.callback.get = data.get;
                        ret.callback.result = true;
                        socketserver.send(JSON.stringify(ret));
                    }
                }
            });
        }
        
        if (urlParams.has("server") || urlParams.has("server2")){
            serverURL = urlParams.get("server") ||  urlParams.get("server2") || serverURL;
            socketserver = new WebSocket(serverURL);
            setupSocket();
        }
    }
</script>
</body>
</html>

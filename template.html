<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@300..800&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 22, 40, 0.8);
            font-family: 'Host Grotesk', sans-serif;
            background-color: #0000;
            font-size: 22px;
        }

		.message-container {
			position: relative;
			margin-bottom: 20px;
			opacity: 0;
			transform: translateY(20px);
			transition: opacity 0.3s ease, transform 0.3s ease;
		}

		.message-container.visible {
			opacity: 1;
			transform: translateY(0);
		}

		.message-container.removing {
			opacity: 0;
			transform: translateY(-20px);
			transition: opacity 0.5s ease, transform 0.5s ease;
		}
		
		.badges:empty, span:empty, .text:empty, .donation:empty {
			display:none;
		}

        .username-box {
            display: flex;
            position: absolute;
            top: -19px;
            left: 0px;
            background: linear-gradient(145deg, #AEC6CF, #B0E0E6);
            padding: 8px 15px;
            border-radius: 8px;
            color: #ffffff;
            font-weight: 600;
            z-index: 2;
            font-size: 0.95em;
        }
		
		.username-box span {
			display:inline-flex;
			margin: auto 0;
		}
		
		.donation {
			padding: 7px 18px 5px 18px;
			color: white;
		}

        .badge {
            height: 1em;
            vertical-align: middle;
            margin-left: 0px;
        }
		.badges {
			margin-left: 10px;
        }

        .message {
            display: inline-block;
            max-height: 150px;
            max-width: 100%;
            background: linear-gradient(90deg, #191817, #1b1c20);
            padding: 27px 18px 18px 18px;
            margin-top: 25px;
            margin-left: 15px;
            border-radius: 10px;
            color: #e02c53;
            position: relative;
            word-wrap: break-word;
        }

        .text {
            font-size: clamp(0.95em, 2.4vw, 1.15em);
            line-height: 1.4;
			word-break: break-word;
        }

        /* Styling for the added 24h timestamp */
        .timestamp {
            font-size: 18px;
            color: #000000;
            margin-right: 8px;
            font-weight: 500;
            user-select: none;
        }

		.badges svg, .badges img, .text svg, .text img {
			max-width:64px;
			max-height:24px;
		}
		
		#chat-container {
			padding: 0;
			max-width: 456px;
			margin: auto;
			height: 100vh;
			overflow-y: auto;
			scrollbar-width: none;  /* Firefox */
			-ms-overflow-style: none;  /* IE and Edge */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
		}

		#chat-container::-webkit-scrollbar {
			display: none;  /* Chrome, Safari, Opera */
		}

		@keyframes slideFadeIn {
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
		
    </style>
</head>
<body>
    <div id="chat-container"></div>

    <script>
    var urlParams = new URLSearchParams(window.location.search);
    var roomID = urlParams.get("session") || "";
    var password = "false"; 
    var featuredMode = false; 

    var hideBots = urlParams.has("hidebots");
    if (urlParams.has("chroma")) {
        var _c = urlParams.get("chroma") || "";
        document.body.style.backgroundColor = _c.charAt(0) === "#" ? _c : "#" + _c;
    }
    if (urlParams.has("font")) {
        var _fs = parseInt(urlParams.get("font"), 10);
        if (!isNaN(_fs) && _fs > 0) { document.documentElement.style.fontSize = (_fs + 3) + "px"; }
    } else {
        document.documentElement.style.fontSize = "22px";
    }
    if (urlParams.has("fontfamily")) {
        var _ff = (urlParams.get("fontfamily") || "").trim();
        if (_ff) {
            var _safe = _ff.replace(/['"\\;{}<>]/g, "");
            var _gf = document.createElement("link");
            _gf.rel = "stylesheet";
            _gf.href = "https://fonts.googleapis.com/css2?family=" + encodeURIComponent(_safe).replace(/%20/g, "+") + ":wght@400;500;600;700&display=swap";
            document.head.appendChild(_gf);
            document.body.style.fontFamily = "'" + _safe + "', sans-serif";
        }
    }

    const chatContainer = document.getElementById('chat-container');

    const SHOWTIME = (() => {
        const v = parseInt(urlParams.get('showtime') || '30000');
        return isNaN(v) ? 30000 : v;
    })();

	function addMessageToOverlay(data) {
		if (hideBots && data.bot) { return; }
		if (!data.chatname && data.meta) {
			return;
		}

		const messageContainer = document.createElement('div');
		messageContainer.classList.add('message-container');
		
		const messageDiv = document.createElement('div');
		messageDiv.classList.add('message');
		if (data.mid) messageDiv.id = data.mid;
		data.sourceicon = `https://socialstream.ninja/sources/images/${data.type}.png`;

		let chatbadges = "";
		if (data.chatbadges) {
			data.chatbadges.slice(0, 2).forEach(badge => {
				if (typeof badge === "object") {
					if (badge.type === "img" && badge.src) {
						chatbadges += `<img class='badge' src='${badge.src}' />`;
					} else if (badge.type === "svg" && badge.html) {
						chatbadges += `<span class='badge svg'>${badge.html}</span>`;
					}
				} else {
					chatbadges += `<img class='badge' src='${badge}' />`;
				}
			});
		}

        // Generate current local time in 24-hour format (HH:MM)
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const timestampStr = `${hours}:${minutes}`;

		messageDiv.innerHTML = `
			${data.chatimg ? `<div class="avatar-wrapper"><div class="avatar" style="background-image: url('${data.chatimg}');"></div></div>` : ''}
			<div class="username-box">
				<span>${data.chatname}</span>
				<span class="badges">${chatbadges}</span>
			</div>
			<div class="text"><span class="timestamp">[${timestampStr}]</span>${data.chatmessage || ''}</div>
			${(data.donation||data.hasDonation) ? `<div class="donation">${(data.donation||data.hasDonation)}</div>` : ''}
		`;

		messageContainer.appendChild(messageDiv);
		chatContainer.appendChild(messageContainer);

		messageContainer.offsetHeight;
		
		requestAnimationFrame(() => {
			messageContainer.classList.add('visible');
            chatContainer.scrollTop = chatContainer.scrollHeight;
		});

        if (SHOWTIME > 0) {
            setTimeout(() => {
                messageContainer.classList.add('removing');
                
                setTimeout(() => {
                    if (messageContainer.parentNode) {
                        messageContainer.parentNode.removeChild(messageContainer);
                    }
                }, 500);
            }, SHOWTIME);
        }
	}

    if (roomID) {
        document.addEventListener('DOMContentLoaded', () => {
            const iframe = document.createElement("iframe");
            iframe.src = featuredMode
                ? `https://vdo.socialstream.ninja/?ln&password=${password}&salt=vdo.ninja&label=overlay&exclude=${roomID}&scene&novideo&noaudio&cleanoutput&room=${roomID}`
                : `https://vdo.socialstream.ninja/?ln&salt=vdo.ninja&password=${password}&push&label=dock&vd=0&ad=0&novideo&noaudio&autostart&cleanoutput&room=${roomID}`;

            iframe.style.cssText = "width: 0px; height: 0px; position: fixed; left: -100px; top: -100px;";
            document.body.appendChild(iframe);

            window.addEventListener("message", (event) => {
                if (event.source !== iframe.contentWindow) return;
                if (event.data && typeof event.data === "object" && event.data.dataReceived && typeof event.data.dataReceived === "object" && event.data.dataReceived.overlayNinja) {
                    addMessageToOverlay(event.data.dataReceived.overlayNinja);
                }
            });
        });
        
        var conCon = 1;
        var socketserver = false;
        var serverURL = urlParams.has("localserver") ? "ws://127.0.0.1:3000" : "wss://io.socialstream.ninja";

        function setupSocket(){
            socketserver.onclose = function () {
                setTimeout(function(){
                    conCon+=1;
                    socketserver = new WebSocket(serverURL);
                    setupSocket();
                },100*conCon);
            };
            socketserver.onopen = function () {
                conCon = 1;
                socketserver.send(JSON.stringify({"join":roomID, "out":3, "in":4}));
            };
            socketserver.addEventListener('message', function (event) {
                var resp = false
                if (event.data){
                    var data = JSON.parse(event.data);
                    addMessageToOverlay(data);
                    if (data.get){
                        var ret = {};
                        ret.callback = {};
                        ret.callback.get = data.get
                        ret.callback.result = true;
                        socketserver.send(JSON.stringify(ret));
                    }
                }
            });
        }
        
        if (urlParams.has("server") || urlParams.has("server2")){
            serverURL = urlParams.get("server") ||  urlParams.get("server2") || serverURL;
            socketserver = new WebSocket(serverURL);
            setupSocket();
        }
    }
</script>
</body>
</html>
